<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="128"
   height="128"
   viewBox="0 0 128 128"
   version="1.1"
   id="svg31"
   sodipodi:docname="org.phonemirror.PhoneMirror.svg"
   inkscape:version="1.4.4 (dcaf3e7d9e, 2026-05-05)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview31"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="7.1484375"
     inkscape:cx="64"
     inkscape:cy="64"
     inkscape:window-width="2012"
     inkscape:window-height="1117"
     inkscape:window-x="0"
     inkscape:window-y="0"
     inkscape:window-maximized="1"
     inkscape:current-layer="g23" />
  <!-- Phone Mirror: GNOME HIG / Libadwaita app icon
       Metaphor: an Android phone mirroring onto a desktop monitor, with a
       broadcast / cast arc to convey wire-free screen sharing. -->
  <defs
     id="defs10">
    <!-- Base rounded-square background: soft Libadwaita teal→blue -->
    <linearGradient
       id="bg"
       x1="64"
       y1="8"
       x2="64"
       y2="120"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#62c0d6"
         id="stop1" />
      <stop
         offset="1"
         stop-color="#2d80c4"
         id="stop2" />
    </linearGradient>
    <!-- Monitor screen fill -->
    <linearGradient
       id="screen"
       x1="40"
       y1="34"
       x2="92"
       y2="78"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#ffffff"
         id="stop3" />
      <stop
         offset="1"
         stop-color="#e8f3fb"
         id="stop4" />
    </linearGradient>
    <!-- Phone body -->
    <linearGradient
       id="phone"
       x1="78"
       y1="60"
       x2="100"
       y2="108"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#3a3f48"
         id="stop5" />
      <stop
         offset="1"
         stop-color="#23272e"
         id="stop6" />
    </linearGradient>
    <!-- Phone screen showing the mirrored content -->
    <linearGradient
       id="phoneScreen"
       x1="80"
       y1="64"
       x2="98"
       y2="100"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#7ad0e6"
         id="stop7" />
      <stop
         offset="1"
         stop-color="#3a93cf"
         id="stop8" />
    </linearGradient>
    <!-- Mirrored phone view shown inside the monitor -->
    <linearGradient
       id="mirror"
       x1="53"
       y1="43"
       x2="71"
       y2="71"
       gradientUnits="userSpaceOnUse">
      <stop
         offset="0"
         stop-color="#7ad0e6"
         id="stop9" />
      <stop
         offset="1"
         stop-color="#3a93cf"
         id="stop10" />
    </linearGradient>
  </defs>
  <!-- Background shape -->
  <rect
     x="8"
     y="8"
     width="112"
     height="112"
     rx="28"
     ry="28"
     fill="url(#bg)"
     id="rect10" />
  <!-- Subtle top sheen -->
  <rect
     x="8"
     y="8"
     width="112"
     height="56"
     rx="28"
     ry="28"
     fill="#ffffff"
     opacity="0.07"
     id="rect11" />
  <!-- ===== Desktop monitor (the mirror target) ===== -->
  <g
     id="g23">
    <!-- Stand -->
    <rect
       x="58"
       y="80"
       width="8"
       height="14"
       rx="2"
       fill="#1d3a52"
       opacity="0.55"
       id="rect12" />
    <rect
       x="46"
       y="92"
       width="32"
       height="6"
       rx="3"
       fill="#1d3a52"
       opacity="0.55"
       id="rect13" />
    <!-- Bezel -->
    <rect
       x="26"
       y="30"
       width="72"
       height="54"
       rx="8"
       ry="8"
       fill="#1d3a52"
       id="rect14" />
    <!-- Screen -->
    <rect
       x="32"
       y="36"
       width="60"
       height="42"
       rx="4"
       ry="4"
       fill="url(#screen)"
       id="rect15" />
    <!-- The phone's screen, mirrored onto the desktop (this is the app's job).
         A portrait phone view centred in the monitor, echoing the real device
         in front. -->
    <g
       id="g22">
      <rect
         x="51"
         y="40"
         width="22"
         height="34"
         rx="5"
         ry="5"
         fill="#1d3a52"
         id="rect16" />
      <rect
         x="53.5"
         y="43"
         width="17"
         height="28"
         rx="2.5"
         ry="2.5"
         fill="url(#mirror)"
         id="rect17" />
      <!-- mirrored content, same layout as the real phone -->
      <rect
         x="56"
         y="46.5"
         width="12"
         height="3"
         rx="1.5"
         fill="#ffffff"
         opacity="0.9"
         id="rect18" />
      <rect
         x="56"
         y="53"
         width="8"
         height="2.4"
         rx="1.2"
         fill="#ffffff"
         opacity="0.55"
         id="rect19" />
      <rect
         x="56"
         y="58"
         width="10"
         height="2.4"
         rx="1.2"
         fill="#ffffff"
         opacity="0.55"
         id="rect20" />
      <rect
         x="56"
         y="63"
         width="6"
         height="2.4"
         rx="1.2"
         fill="#ffffff"
         opacity="0.55"
         id="rect21" />
      <rect
         x="59"
         y="67.6"
         width="6"
         height="1.8"
         rx="0.9"
         fill="#ffffff"
         opacity="0.7"
         id="rect22" />
    </g>
  </g>
  <!-- ===== Phone (the source, in front) ===== -->
  <g
     id="g29">
    <!-- soft drop shadow -->
    <rect
       x="75"
       y="59"
       width="30"
       height="50"
       rx="8"
       ry="8"
       fill="#0a1a28"
       opacity="0.20"
       id="rect23" />
    <rect
       x="74"
       y="57"
       width="30"
       height="50"
       rx="8"
       ry="8"
       fill="url(#phone)"
       id="rect24" />
    <!-- phone screen mirroring same content -->
    <rect
       x="78"
       y="62"
       width="22"
       height="40"
       rx="3"
       ry="3"
       fill="url(#phoneScreen)"
       id="rect25" />
    <!-- mirrored window hint, echoing the monitor -->
    <rect
       x="81"
       y="66"
       width="16"
       height="4"
       rx="2"
       fill="#ffffff"
       opacity="0.85"
       id="rect26" />
    <rect
       x="81"
       y="73"
       width="11"
       height="3"
       rx="1.5"
       fill="#ffffff"
       opacity="0.55"
       id="rect27" />
    <rect
       x="81"
       y="79"
       width="13"
       height="3"
       rx="1.5"
       fill="#ffffff"
       opacity="0.55"
       id="rect28" />
    <!-- home indicator -->
    <rect
       x="84"
       y="98"
       width="10"
       height="2.4"
       rx="1.2"
       fill="#ffffff"
       opacity="0.7"
       id="rect29" />
  </g>
  <!-- ===== Cast / broadcast signal (wire-free mirroring) =====
       Concentric arcs radiating from a single source point so they read as a
       proper wireless / cast glyph, placed over the blue for legibility. -->
  <g
     transform="translate(95 57)"
     fill="none"
     stroke="#ffffff"
     stroke-linecap="round"
     id="g31">
    <!-- source node -->
    <circle
       cx="0"
       cy="0"
       r="2.6"
       fill="#ffffff"
       stroke="none"
       id="circle29" />
    <!-- three concentric arcs, all centred on (0,0), opening up-right -->
    <path
       d="M1.25 -5.87 A6 6 0 0 1 5.87 -1.25"
       stroke-width="3"
       opacity="0.95"
       id="path29" />
    <path
       d="M2.29 -10.76 A11 11 0 0 1 10.76 -2.29"
       stroke-width="3"
       opacity="0.75"
       id="path30" />
    <path
       d="M3.33 -15.65 A16 16 0 0 1 15.65 -3.33"
       stroke-width="3"
       opacity="0.55"
       id="path31" />
  </g>
</svg>
