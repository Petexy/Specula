<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Specula / Phone Mirror — refined alternate icon (specula3), evolved from
     specula2.svg. Metaphor: an Android phone wirelessly mirroring onto a
     desktop monitor. Improvements: soft blurred drop shadows, glassy screen
     sheen, ambient top-left lighting, a glowing broadcast point, richer
     screen colour, and de-duplicated defs. -->
<svg
   width="128"
   height="128"
   viewBox="0 0 128 128"
   version="1.1"
   id="specula3"
   xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep violet tile -->
    <radialGradient
       id="background"
       cx="64" cy="54" r="82"
       gradientUnits="userSpaceOnUse"
       gradientTransform="matrix(1.05,0,0,1.1,-3.2,-5.4)">
      <stop offset="0"    stop-color="#3f2e56" />
      <stop offset="0.38" stop-color="#30233f" />
      <stop offset="0.74" stop-color="#1f1726" />
      <stop offset="1"    stop-color="#120f18" />
    </radialGradient>
    <!-- Ambient light from the upper-left -->
    <radialGradient
       id="bgGlow"
       cx="40" cy="22" r="88"
       gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#9b7fcf" stop-opacity="0.45" />
      <stop offset="0.55" stop-color="#5a4080" stop-opacity="0.10" />
      <stop offset="1"    stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <!-- Grounding shade along the bottom -->
    <linearGradient
       id="bgShade"
       x1="0" y1="68" x2="0" y2="128"
       gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0" />
      <stop offset="1" stop-color="#000000" stop-opacity="0.30" />
    </linearGradient>
    <!-- Pearl device frames -->
    <linearGradient
       id="pearl"
       x1="35" y1="29" x2="86" y2="105"
       gradientUnits="userSpaceOnUse">
      <stop              stop-color="#ffffff" />
      <stop offset=".58" stop-color="#f2eff5" />
      <stop offset="1"   stop-color="#bbb7c2" />
    </linearGradient>
    <!-- Screens -->
    <linearGradient
       id="monitor-screen"
       x1="31" y1="38" x2="90" y2="80"
       gradientUnits="userSpaceOnUse">
      <stop              stop-color="#5e4880" />
      <stop offset=".52" stop-color="#332440" />
      <stop offset="1"   stop-color="#17121d" />
    </linearGradient>
    <linearGradient
       id="violet-screen"
       x1="77" y1="61" x2="100" y2="104"
       gradientUnits="userSpaceOnUse">
      <stop             stop-color="#4d3473" />
      <stop offset=".5" stop-color="#7a55b4" />
      <stop offset="1"  stop-color="#ad81f0" />
    </linearGradient>
    <linearGradient
       id="mirror-screen"
       x1="53" y1="44" x2="70" y2="72"
       gradientUnits="userSpaceOnUse">
      <stop            stop-color="#4a316e" />
      <stop offset="1" stop-color="#a679e9" />
    </linearGradient>
    <!-- Reusable glassy top sheen (object space, so it suits any rect) -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"  stop-color="#ffffff" stop-opacity="0.28" />
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <!-- Broadcast arcs -->
    <linearGradient
       id="signal"
       x1="96" y1="56" x2="112" y2="38"
       gradientUnits="userSpaceOnUse">
      <stop            stop-color="#c98bff" />
      <stop offset="1" stop-color="#9a6be0" />
    </linearGradient>
    <!-- Soft shadow + glow -->
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4" />
    </filter>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="2.1" />
    </filter>
  </defs>

  <!-- Tile + lighting -->
  <rect x="0" y="0" width="128" height="128" rx="32" ry="32" fill="url(#background)" />
  <rect x="0" y="0" width="128" height="128" rx="32" ry="32" fill="url(#bgGlow)" />
  <rect x="0" y="0" width="128" height="128" rx="32" ry="32" fill="url(#bgShade)" />

  <!-- Soft shadows cast by the devices -->
  <g fill="#070509" filter="url(#softShadow)">
    <rect x="17.9" y="29.6" width="83.4" height="62.3" rx="11.1" opacity="0.45" />
    <rect x="76.2" y="57.4" width="37.8" height="62.3" rx="11.1" opacity="0.5" />
  </g>

  <!-- ===== Desktop monitor (the mirror target) ===== -->
  <g transform="matrix(1.1122982,0,0,1.1122982,-7.6868099,-8.0854684)">
    <rect x="23" y="30" width="75" height="56" rx="10" fill="url(#pearl)" />
    <rect x="23" y="30" width="75" height="56" rx="10" fill="url(#sheen)" />
    <rect x="29" y="36" width="63" height="43" rx="5" fill="url(#monitor-screen)" />
    <rect x="29" y="36" width="63" height="43" rx="5" fill="url(#sheen)" />
    <path d="m 58,85 h 9 v 10 h 12 a 4,4 0 0 1 4,4 v 1 H 43 v -1 a 4,4 0 0 1 4,-4 h 11 z"
       fill="url(#pearl)" />
  </g>

  <!-- ===== Mirrored device shown inside the monitor ===== -->
  <g transform="matrix(1.1122982,0,0,1.1122982,-7.6868099,-8.0854684)">
    <rect x="50" y="40" width="23" height="35" rx="6" fill="url(#pearl)" />
    <rect x="54" y="44" width="15" height="27" rx="3" fill="url(#mirror-screen)" />
    <rect x="54" y="44" width="15" height="27" rx="3" fill="url(#sheen)" />
    <g fill="#ffffff">
      <rect x="56.5" y="48"   width="10" height="3"   rx="1.5"  opacity="0.9" />
      <rect x="56.5" y="54.5" width="7"  height="2.3" rx="1.15" opacity="0.55" />
      <rect x="56.5" y="59.5" width="9"  height="2.3" rx="1.15" opacity="0.55" />
      <rect x="59"   y="67"   width="5"  height="1.7" rx="0.85" opacity="0.8" />
    </g>
  </g>

  <!-- ===== Foreground phone (the source) ===== -->
  <g transform="matrix(1.1122982,0,0,1.1122982,-7.6868099,-8.0854684)">
    <rect x="73" y="55" width="34" height="56" rx="10" fill="url(#pearl)" />
    <rect x="73" y="55" width="34" height="56" rx="10" fill="url(#sheen)" />
    <rect x="78" y="61" width="24" height="43" rx="5" fill="url(#violet-screen)" />
    <rect x="78" y="61" width="24" height="43" rx="5" fill="url(#sheen)" />
    <g fill="#ffffff">
      <rect x="82" y="66"   width="16" height="4" rx="2"   opacity="0.92" />
      <rect x="82" y="73.5" width="11" height="3" rx="1.5" opacity="0.6" />
      <rect x="82" y="79.5" width="14" height="3" rx="1.5" opacity="0.6" />
      <rect x="85" y="99"   width="10" height="2" rx="1"   opacity="0.78" />
    </g>
  </g>

  <!-- ===== Wireless broadcast ===== -->
  <g transform="matrix(1.1122982,0,0,1.1122982,97.981516,55.315527)"
     fill="none" stroke="url(#signal)" stroke-width="3.5" stroke-linecap="round">
    <path d="m 1.35,-6.35 a 6.5,6.5 0 0 1 5,5" />
    <path d="m 2.5,-11.75 a 12,12 0 0 1 9.25,9.25" opacity="0.84" />
    <path d="m 3.65,-17.15 a 17.5,17.5 0 0 1 13.5,13.5" opacity="0.68" />
  </g>
  <!-- glowing source point -->
  <circle cx="97.981514" cy="55.315529" r="5" fill="#bd86ff" opacity="0.6" filter="url(#glow)" />
  <circle cx="97.981514" cy="55.315529" r="3.3368945" fill="#ffffff" stroke="#bd79fa" stroke-width="2.2246" />

  <!-- Finishing hairline edge -->
  <rect x="1" y="1" width="126" height="126" rx="31" ry="31"
     fill="none" stroke="#c6a8df" stroke-opacity="0.14" />
</svg>
